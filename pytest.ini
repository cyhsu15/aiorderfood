[pytest]
# Pytest 配置文件

# 自動發現測試的路徑
testpaths = test

# Python 文件模式
python_files = test_*.py

# 測試類別模式
python_classes = Test*

# 測試函數模式
python_functions = test_*

# 自訂標記 (markers)
markers =
    slow: 標記為慢速測試
    e2e: E2E 測試 (需要 Playwright)
    integration: 整合測試
    unit: 單元測試

# Asyncio 模式
asyncio_mode = strict

# 輸出設定
addopts =
    -v
    --tb=short
    --strict-markers
    # --headed              # 取消註解以預設顯示瀏覽器
    # --slowmo 500          # 取消註解以慢動作執行 (500ms 延遲)

# 警告過濾
filterwarnings =
    ignore::DeprecationWarning
