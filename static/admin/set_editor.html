<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>套餐設定</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; margin:0; background:#f9fafb; color:#111827; }
      .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
      .card { background:#fff; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,.06); padding:12px 16px; }
      .row { display:flex; gap:8px; align-items:center; }
      .col { display:flex; flex-direction:column; gap:8px; }
      .grid { display:grid; grid-template-columns: 1.2fr 1fr; gap: 16px; }
      .btn { background:#2563eb; color:#fff; border:none; border-radius:6px; padding:6px 10px; cursor:pointer; }
      .btn.ghost { background:transparent; color:#2563eb; }
      .btn.danger { background:#dc2626; }
      select, input[type=number] { padding:6px 8px; border:1px solid #d1d5db; border-radius:6px; }
      ul { list-style:none; padding:0; margin:0; }
      li { padding:6px 0; border-bottom:1px solid #f3f4f6; }
      .muted { color:#6b7280; }
      .header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; }
      .cat-title { font-weight:600; margin-top:8px; }
      .pill { display:inline-block; background:#eef2ff; color:#4338ca; padding:2px 6px; border-radius:999px; font-size:12px; margin-left:8px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 style="margin:0; font-size:20px;">套餐設定</h1>
        <a href="/admin/index.html" class="btn ghost">返回管理</a>
      </div>

      <div class="card">
        <div class="row" style="margin-bottom:8px;">
          <label class="muted">選擇套餐</label>
          <select id="setSelect"></select>
          <button id="btnLoadSet" class="btn">載入</button>
          <span id="hint" class="muted"></span>
        </div>

        <div class="grid">
          <!-- 左：可選菜色（依類別） -->
          <div class="col">
            <h3 style="margin:0 0 6px;">選擇菜色</h3>
            <div id="catalog"></div>
          </div>

          <!-- 右：已選清單（可調整數量與排序） -->
          <div class="col">
            <h3 style="margin:0 0 6px;">已選內容</h3>
            <ul id="selectedList"></ul>
            <div class="row" style="justify-content:flex-end; gap:8px; margin-top:8px;">
              <button id="btnSave" class="btn">儲存</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/admin/set_editor.js"></script>
  </body>
  </html>
