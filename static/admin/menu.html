<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>菜單管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold text-primary" href="/admin/">後台首頁</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="/admin/orders.html">訂單管理</a>
          <a class="btn btn-outline-secondary btn-sm" href="/admin/sessions.html">Session 管理</a>
          <a class="btn btn-outline-primary btn-sm" href="/">返回前台</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div>
          <h1 class="h3 fw-semibold mb-1">菜單管理</h1>
          <p class="text-secondary mb-0">維護分類、菜色、價格與描述，確保前台內容最新。</p>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="btnNewCategory">新增類別</button>
          <button class="btn btn-success" id="btnNewDish" disabled>新增菜色</button>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-header bg-white">
              <h2 class="h6 mb-0">類別</h2>
            </div>
            <div class="card-body p-0">
              <ul class="list-group list-group-flush" id="categoryList">
                <li class="list-group-item text-secondary">尚無資料</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
              <h2 class="h6 mb-0">菜色 <span id="currentCategory" class="text-secondary"></span></h2>
            </div>
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>名稱</th>
                    <th>價格</th>
                    <th>排序</th>
                    <th class="text-end">操作</th>
                  </tr>
                </thead>
                <tbody id="dishTableBody">
                  <tr><td colspan="4" class="text-secondary text-center py-4">請先選擇類別</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Category Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="categoryModalTitle">新增類別</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">中文名稱</label>
              <input id="categoryNameZh" type="text" class="form-control" placeholder="中文名稱" />
            </div>
            <div class="mb-3">
              <label class="form-label">英文名稱 (可空)</label>
              <input id="categoryNameEn" type="text" class="form-control" placeholder="英文名稱" />
            </div>
            <div>
              <label class="form-label">排序 (預設 0)</label>
              <input id="categorySortOrder" type="number" class="form-control" placeholder="排序" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
            <button type="button" class="btn btn-primary" id="btnSaveCategory">儲存</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Dish Modal -->
    <div class="modal fade" id="dishModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="dishModalTitle">新增菜色</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">所屬類別</label>
                <select id="dishCategory" class="form-select"></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">排序</label>
                <input id="dishSortOrder" type="number" class="form-control" placeholder="排序" />
              </div>
              <div class="col-md-8">
                <label class="form-label">中文名稱</label>
                <input id="dishNameZh" type="text" class="form-control" placeholder="菜色名稱" />
              </div>
              <div class="col-md-4 d-flex align-items-center">
                <div class="form-check mt-4">
                  <input class="form-check-input" type="checkbox" id="dishIsSet" />
                  <label class="form-check-label" for="dishIsSet">套餐</label>
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label">圖片 URL</label>
                <input id="dishImageUrl" type="text" class="form-control" placeholder="可空" />
              </div>
              <div class="col-md-6">
                <label class="form-label">標籤 (逗號分隔)</label>
                <input id="dishTags" type="text" class="form-control" placeholder="例：辣,招牌,素食" />
              </div>
              <div class="col-12">
                <label class="form-label">詳細描述</label>
                <textarea id="dishDescription" class="form-control" rows="4" placeholder="輸入詳細描述"></textarea>
              </div>
            </div>
            <hr />
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="mb-0">價格</h6>
              <button class="btn btn-sm btn-outline-primary" id="btnAddPrice" type="button">新增價格</button>
            </div>
            <div id="priceList" class="vstack gap-2"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
            <button type="button" class="btn btn-success" id="btnSaveDish">儲存</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/admin.js"></script>
  </body>
</html>
