<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 生成器 - 餐桌管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            color: #444;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-section {
            display: none;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-top: 30px;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qrcode-display {
            text-align: center;
            margin: 24px 0;
        }

        .qrcode-display img {
            max-width: 300px;
            border: 4px solid #667eea;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .info-box {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e1e8ed;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 600;
        }

        .info-value {
            color: #333;
            word-break: break-all;
            max-width: 60%;
            text-align: right;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
            }

            .input-section,
            .button-group,
            .subtitle {
                display: none;
            }

            .result-section {
                display: block !important;
                page-break-inside: avoid;
            }

            .qrcode-display img {
                max-width: 400px;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 餐桌 QR Code 生成器</h1>
        <p class="subtitle">生成餐桌專屬的 QR Code，讓顧客掃描後可以多人共同點餐</p>

        <div id="alertContainer"></div>

        <div class="input-section">
            <div class="input-group">
                <label for="tableId">桌號 <span style="color: #dc3545;">*</span></label>
                <input
                    type="text"
                    id="tableId"
                    placeholder="例如: A1, B2, 3F-01"
                    autocomplete="off"
                    required
                >
            </div>

            <div class="input-group">
                <label for="sessionId">Session ID（可選）</label>
                <input
                    type="text"
                    id="sessionId"
                    placeholder="留空則自動生成新的 UUID"
                    autocomplete="off"
                >
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="generateQRCode()">
                    <span>🎯</span> 生成 QR Code
                </button>
                <button class="btn-secondary" onclick="resetForm()">
                    <span>🔄</span> 重置
                </button>
            </div>
        </div>

        <div id="resultSection" class="result-section">
            <h2 style="color: #333; margin-bottom: 20px;">✅ 生成成功</h2>

            <div class="qrcode-display">
                <img id="qrcodeImage" src="" alt="QR Code">
                <p style="margin-top: 12px; color: #666; font-weight: 600; font-size: 18px;">
                    桌號: <span id="displayTableId" style="color: #667eea;"></span>
                </p>
            </div>

            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">連結網址</span>
                    <span class="info-value" id="displayUrl"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Session ID</span>
                    <span class="info-value" id="displaySessionId"></span>
                </div>
            </div>

            <div class="button-group" style="margin-top: 24px;">
                <button class="btn-success" onclick="downloadQRCode()">
                    <span>📥</span> 下載 PNG
                </button>
                <button class="btn-secondary" onclick="window.print()">
                    <span>🖨️</span> 列印
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentTableId = '';
        let currentSessionId = '';
        let currentQRCodeBase64 = '';

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
            container.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;

            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        async function generateQRCode() {
            const tableId = document.getElementById('tableId').value.trim();
            const sessionId = document.getElementById('sessionId').value.trim();

            // 驗證桌號
            if (!tableId) {
                showAlert('請輸入桌號', 'error');
                return;
            }

            try {
                // 構建 API URL
                let apiUrl = `/api/admin/qrcode/generate?tableid=${encodeURIComponent(tableId)}`;
                if (sessionId) {
                    apiUrl += `&sessionid=${encodeURIComponent(sessionId)}`;
                }

                // 呼叫 API
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`API 錯誤: ${response.status}`);
                }

                const data = await response.json();

                // 顯示結果
                currentTableId = data.table_id;
                currentSessionId = data.session_id;
                currentQRCodeBase64 = data.qrcode_base64;

                document.getElementById('qrcodeImage').src = `data:image/png;base64,${data.qrcode_base64}`;
                document.getElementById('displayTableId').textContent = data.table_id;
                document.getElementById('displayUrl').textContent = data.url;
                document.getElementById('displaySessionId').textContent = data.session_id;

                document.getElementById('resultSection').classList.add('show');
                showAlert('QR Code 生成成功！', 'success');

            } catch (error) {
                console.error('生成失敗:', error);
                showAlert(`生成失敗: ${error.message}`, 'error');
            }
        }

        function downloadQRCode() {
            if (!currentQRCodeBase64 || !currentTableId) {
                showAlert('請先生成 QR Code', 'error');
                return;
            }

            // 創建下載連結
            const link = document.createElement('a');
            link.href = `data:image/png;base64,${currentQRCodeBase64}`;
            link.download = `table_${currentTableId}_qrcode.png`;
            link.click();

            showAlert('下載已開始', 'success');
        }

        function resetForm() {
            document.getElementById('tableId').value = '';
            document.getElementById('sessionId').value = '';
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('alertContainer').innerHTML = '';

            currentTableId = '';
            currentSessionId = '';
            currentQRCodeBase64 = '';
        }

        // Enter 鍵提交
        document.getElementById('tableId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateQRCode();
            }
        });

        document.getElementById('sessionId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateQRCode();
            }
        });
    </script>
</body>
</html>
