<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Session 管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold text-primary" href="/admin/">後台首頁</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="/admin/menu.html">菜單管理</a>
          <a class="btn btn-outline-secondary btn-sm" href="/admin/orders.html">訂單管理</a>
          <a class="btn btn-outline-primary btn-sm" href="/">返回前台</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div>
          <h1 class="h3 fw-semibold mb-1">Session 管理</h1>
          <p class="text-secondary mb-0">查看訪客 Session 與購物車，必要時可清空或刪除。</p>
        </div>
        <button class="btn btn-outline-primary" id="btnRefreshSessions">重新整理</button>
      </div>

      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="mb-3">
                <input type="search" class="form-control" id="sessionKeyword" placeholder="搜尋 Session ID 或備註" />
              </div>
              <div class="list-group" id="sessionList">
                <div class="list-group-item text-center text-secondary py-4">載入資料中…</div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                  <h2 class="h5 mb-1" id="detailTitle">尚未選擇 Session</h2>
                  <p class="text-secondary mb-0" id="detailSummary">左側點選 Session 以檢視詳細資料。</p>
                </div>
                <div class="btn-group" id="detailActions" hidden>
                  <button class="btn btn-outline-warning" id="btnClearCart">清空購物車</button>
                  <button class="btn btn-outline-danger" id="btnDeleteSession">刪除 Session</button>
                </div>
              </div>
              <div class="card bg-light-subtle border-0 mb-3">
                <div class="card-body small text-secondary" id="detailMeta">尚無資料</div>
              </div>
              <div class="table-responsive">
                <table class="table table-sm table-striped align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>品項</th>
                      <th>備註</th>
                      <th class="text-end">數量</th>
                      <th class="text-end">單價</th>
                    </tr>
                  </thead>
                  <tbody id="detailCart">
                    <tr><td colspan="4" class="text-secondary text-center py-4">尚未選擇 Session。</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/sessions.js"></script>
  </body>
</html>
